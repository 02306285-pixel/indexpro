          BUSCAR
        </button>
      </form>

      <script>
        function redirigir(e) {
          e.preventDefault();

          let valor = document.getElementById("busqueda").value.toLowerCase();

          if (valor.includes("inicio")) {
            window.location.href = "index.html";
          } else if (valor.includes("Recetas faciles")) {
            window.location.href = "velazquezpag1.html";
          } else if (valor.includes("postres saludables")) {
            window.location.href = "velazquezpag2.html";
          } else if (valor.includes("postres mexicanos")) {
            window.location.href = "velazquezpag3.html";
          } else if (valor.includes("tendencias") || valor.includes("resenas")) {
            window.location.href = "velazquezpag4.html";
          } else if (valor.includes("pedidos")) {
            window.location.href = "velazquezpag5.html";
          } else if (valor.includes("Introducción")) {
            window.location.href = "velazquezpag0.html";
            alert("No se encontró la búsqueda");
          }
        }
